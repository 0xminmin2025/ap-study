<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AP Study Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#fff;--bg2:#fafafa;--bg3:#f5f5f5;
--text:#111;--text2:#555;--text3:#999;
--red:#d32f2f;--red-light:#fff5f5;--red-border:#ffcdd2;
--green:#2e7d32;--green-light:#f1f8e9;
--border:#e0e0e0;--border2:#eee;
--shadow:0 1px 4px rgba(0,0,0,.08);
--radius:6px;
--font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;
--mono:'SF Mono','Fira Code','Consolas',monospace;
}
/* === DARK MODE === */
[data-theme="dark"]{
--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
--red:#ef4444;--red-light:#1c1111;--red-border:#7f1d1d;
--green:#22c55e;--green-light:#0d1f0d;
--border:#334155;--border2:#1e293b;
--shadow:0 1px 4px rgba(0,0,0,.3);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.65;-webkit-font-smoothing:antialiased}

[data-theme="dark"] .topbar{background:var(--bg2);border-bottom-color:var(--border)}
[data-theme="dark"] .auth-box input{background:var(--bg2);color:var(--text);border-color:var(--border)}
[data-theme="dark"] .auth-box button{background:var(--text);color:var(--bg)}
[data-theme="dark"] .subj-btn{background:var(--bg2);color:var(--text2);border-color:var(--border)}
[data-theme="dark"] .subj-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
[data-theme="dark"] .opt{background:var(--bg2);border-color:var(--border)}
[data-theme="dark"] .opt:hover{border-color:var(--text3)}
[data-theme="dark"] .q-card{background:var(--bg2);border-color:var(--border)}
[data-theme="dark"] .start-btn{background:var(--text);color:var(--bg)}
[data-theme="dark"] mark{background:#854d0e;color:#fef3c7}
[data-theme="dark"] .katex{color:var(--text)}

/* === AUTH SCREEN === */
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{text-align:center;max-width:320px;width:100%}
.auth-box h1{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.auth-box p{color:var(--text3);font-size:13px;margin-bottom:32px}
.auth-box input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;text-align:center;outline:none;transition:border .2s}
.auth-box input:focus{border-color:var(--text)}
.auth-box button{width:100%;padding:12px;margin-top:12px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.auth-box button:hover{opacity:.85}
.auth-err{color:var(--red);font-size:13px;margin-top:8px;display:none}

/* === LAYOUT === */
#app{display:none}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:16px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.topbar .sep{color:var(--text3);font-size:12px}
.topbar .loc{color:var(--text2);font-size:13px;font-weight:500}
.topbar .spacer{flex:1}
.topbar .icon-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text2);transition:background .15s}
.topbar .icon-btn:hover{background:var(--bg3)}
.topbar .icon-btn.active{color:var(--red)}

/* === SUBJECT SELECTOR === */
.subj-bar{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--bg2);border-bottom:1px solid var(--border2)}
.subj-btn{padding:6px 12px;border:1px solid var(--border);background:var(--bg);border-radius:16px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.subj-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.subj-btn:hover:not(.active){background:var(--bg3)}

/* === NAV TABS === */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs button{padding:10px 16px;border:none;background:none;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.tabs button.active{color:var(--text);border-bottom-color:var(--red)}
.tabs button:hover{color:var(--text2)}

/* === PANELS === */
.panel{display:none;padding:16px;max-width:800px;margin:0 auto}
.panel.active{display:block}

/* === KNOWLEDGE / LEARN === */
.unit-list{display:flex;flex-direction:column;gap:1px;background:var(--border2)}
.unit-item{background:var(--bg);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .1s}
.unit-item:hover{background:var(--bg2)}
.unit-item .num{width:28px;height:28px;border:1.5px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text2);flex-shrink:0}
.unit-item .info{flex:1;min-width:0}
.unit-item .info h3{font-size:14px;font-weight:600;margin-bottom:2px}
.unit-item .info p{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unit-item .arrow{color:var(--text3);font-size:14px}

.section-list{display:flex;flex-direction:column;gap:1px;background:var(--border2)}
.section-item{background:var(--bg);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .1s}
.section-item:hover{background:var(--bg2)}
.section-item .dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0}
.section-item .dot.read{background:var(--green)}
.section-item h4{font-size:14px;font-weight:500;flex:1}
.section-item .wc{font-size:11px;color:var(--text3)}

/* Article reader */
.reader{padding:0}
.reader-header{padding:16px;border-bottom:1px solid var(--border2)}
.reader-header .breadcrumb{font-size:12px;color:var(--text3);margin-bottom:8px}
.reader-header .breadcrumb span{cursor:pointer;color:var(--text2)}
.reader-header .breadcrumb span:hover{color:var(--red)}
.reader-header h2{font-size:20px;font-weight:700;letter-spacing:-.3px}
.reader-body{padding:16px;font-size:15px;line-height:1.75}
.reader-body p{margin-bottom:12px}
.reader-body h3,.reader-body h4{font-weight:700;margin:20px 0 8px}
.reader-body h3{font-size:17px}
.reader-body h4{font-size:15px}
.reader-body ul,.reader-body ol{margin:8px 0 12px 20px}
.reader-body li{margin-bottom:4px}
.reader-body .key-term{color:var(--red);font-weight:600}
.reader-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.reader-body th,.reader-body td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.reader-body th{background:var(--bg3);font-weight:600}
.reader-body code{font-family:var(--mono);font-size:13px;background:var(--bg3);padding:2px 5px;border-radius:3px}
.reader-body .formula-block{background:var(--bg2);border-left:3px solid var(--red);padding:12px 16px;margin:12px 0;border-radius:0 var(--radius) var(--radius) 0;overflow-x:auto}

/* Key terms sidebar */
.key-terms{margin:16px;padding:14px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius)}
.key-terms h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px}
.key-terms .tags{display:flex;flex-wrap:wrap;gap:6px}
.key-terms .tag{font-size:12px;padding:3px 8px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text2);cursor:pointer;transition:all .15s}
.key-terms .tag:hover{border-color:var(--red);color:var(--red)}

/* === STATS DASHBOARD === */
.stats-dash{margin-bottom:16px;padding:14px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius)}
.stats-dash h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.stats-grid .s-item{text-align:center}
.stats-grid .s-val{font-size:20px;font-weight:700}
.stats-grid .s-label{font-size:11px;color:var(--text3)}
.year-bars{display:flex;gap:3px;align-items:flex-end;height:40px;margin-top:8px}
.year-bars .yb{flex:1;min-width:0;border-radius:2px 2px 0 0;cursor:pointer;position:relative;transition:opacity .15s}
.year-bars .yb:hover{opacity:.8}
.year-bars .yb .yb-tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;z-index:10}
.year-bars .yb:hover .yb-tip{display:block}

/* === QUIZ / PRACTICE === */
.quiz-config{padding:16px}
.quiz-config h3{font-size:16px;font-weight:700;margin-bottom:12px}
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-row select,.filter-row input{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg);outline:none}
.filter-row select:focus,.filter-row input:focus{border-color:var(--text)}
.start-btn{padding:10px 24px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.start-btn:hover{opacity:.85}

.q-card{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.q-header{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px}
.q-header .q-num{font-size:12px;font-weight:700;color:var(--text2)}
.q-header .q-tag{font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:10px;color:var(--text3)}
.q-header .spacer{flex:1}
.q-header .q-flag{cursor:pointer;color:var(--text3);font-size:16px}
.q-header .q-flag.flagged{color:var(--red)}
.q-body{padding:16px}
.q-body .q-text{font-size:14px;line-height:1.7;margin-bottom:16px}
.q-body .q-text table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.q-body .q-text th,.q-body .q-text td{border:1px solid var(--border);padding:5px 8px}
.q-body .q-text th{background:var(--bg3);font-weight:600}

/* MCQ Options */
.options{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;font-size:14px}
.opt:hover{background:var(--bg2);border-color:var(--text3)}
.opt.selected{border-color:var(--text);background:var(--bg2)}
.opt.correct{border-color:var(--green);background:var(--green-light)}
.opt.wrong{border-color:var(--red);background:var(--red-light)}
.opt .letter{font-weight:700;color:var(--text2);min-width:18px}
.opt.correct .letter{color:var(--green)}
.opt.wrong .letter{color:var(--red)}

/* FRQ */
.frq-parts{margin-top:12px}
.frq-part{margin-bottom:12px;padding:10px 12px;background:var(--bg2);border-radius:var(--radius)}
.frq-part .part-label{font-weight:700;font-size:13px;margin-bottom:4px}
.frq-part .part-text{font-size:14px;line-height:1.6}
.show-answer-btn{margin-top:12px;padding:8px 16px;border:1px solid var(--border);background:var(--bg);border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s}
.show-answer-btn:hover{border-color:var(--text);color:var(--text)}
.scoring-guide{margin-top:12px;padding:12px;background:var(--bg2);border-left:3px solid var(--red);border-radius:0 var(--radius) var(--radius) 0;font-size:13px;line-height:1.6;display:none;max-height:300px;overflow-y:auto;white-space:pre-wrap}

/* Quiz footer */
.q-footer{padding:12px 16px;border-top:1px solid var(--border2);display:flex;align-items:center;gap:8px}
.q-footer button{padding:8px 16px;border:1px solid var(--border);background:var(--bg);border-radius:var(--radius);font-size:13px;cursor:pointer;transition:all .15s}
.q-footer button:hover{border-color:var(--text)}
.q-footer .spacer{flex:1}
.q-footer .progress{font-size:12px;color:var(--text3)}

/* Quiz results */
.results{text-align:center;padding:40px 16px}
.results .score{font-size:48px;font-weight:700;margin-bottom:4px}
.results .score-label{font-size:14px;color:var(--text3);margin-bottom:24px}
.results .stats{display:flex;justify-content:center;gap:24px;margin-bottom:24px}
.results .stat{text-align:center}
.results .stat .val{font-size:20px;font-weight:700}
.results .stat .label{font-size:12px;color:var(--text3)}

/* === ERROR LOG / REVIEW === */
.review-empty{text-align:center;padding:60px 16px;color:var(--text3)}
.review-empty svg{margin-bottom:12px}
.review-empty p{font-size:14px}
.err-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .1s}
.err-item:hover{background:var(--bg2)}
.err-item .err-q{flex:1;font-size:13px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.err-item .err-meta{text-align:right;flex-shrink:0}
.err-item .err-meta .date{font-size:11px;color:var(--text3)}
.err-item .err-meta .attempts{font-size:11px;color:var(--red)}

/* === SEARCH === */
.search-bar{padding:12px 16px;border-bottom:1px solid var(--border2)}
.search-bar input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;outline:none;transition:border .2s}
.search-bar input:focus{border-color:var(--text)}
.search-results{padding:8px 0}
.search-hit{padding:10px 16px;cursor:pointer;transition:background .1s}
.search-hit:hover{background:var(--bg2)}
.search-hit .hit-title{font-size:14px;font-weight:600;margin-bottom:2px}
.search-hit .hit-snippet{font-size:12px;color:var(--text2);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.search-hit .hit-snippet mark{background:var(--red-light);color:var(--red);font-weight:600;padding:0 2px;border-radius:2px}

/* === RESPONSIVE === */
@media(max-width:480px){
  .topbar h1{font-size:14px}
  .tabs button{padding:8px 12px;font-size:12px}
  .panel{padding:12px}
  .reader-body{font-size:14px}
}

/* === ICONS (inline SVG) === */
.icon{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
<div class="auth-box">
<h1>AP Study Hub</h1>
<p>Knowledge Base + Practice + Review</p>
<input type="password" id="pw" placeholder="Password" autocomplete="off">
<button onclick="doAuth()">Enter</button>
<div class="auth-err" id="authErr">Incorrect password</div>
</div>
</div>

<!-- APP -->
<div id="app">
<div class="topbar">
<h1>AP Study Hub</h1>
<span class="sep">·</span>
<span class="loc" id="topLoc">Statistics</span>
<div class="spacer"></div>
<button class="icon-btn" onclick="toggleSearch()"><svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></button>
<button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle dark mode"><svg class="icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
</div>
<div class="subj-bar" id="subjectBar"></div>

<div class="tabs" id="mainTabs">
<button class="active" data-tab="learn" onclick="switchTab('learn')">Learn</button>
<button data-tab="quiz" onclick="switchTab('quiz')">Practice</button>
<button data-tab="review" onclick="switchTab('review')">Review</button>
</div>

<!-- Search overlay -->
<div id="searchPanel" style="display:none">
<div class="search-bar"><input type="text" id="searchInput" placeholder="Search notes, terms, questions..." oninput="doSearch(this.value)"></div>
<div class="search-results" id="searchResults"></div>
</div>

<!-- LEARN PANEL -->
<div class="panel active" id="learnPanel">
<div id="unitListView"></div>
<div id="sectionListView" style="display:none"></div>
<div id="readerView" style="display:none"></div>
</div>

<!-- QUIZ PANEL -->
<div class="panel" id="quizPanel">
<div id="quizConfig">
<div id="statsDash"></div>
<h3>Start Practice</h3>
<div class="filter-row">
<select id="qType"><option value="mcq">Multiple Choice</option><option value="frq">Free Response</option><option value="practice">Chapter Practice</option></select>
<select id="qYear"><option value="all">All Years</option></select>
<select id="qCount"><option value="10">10 Questions</option><option value="20">20 Questions</option><option value="40">40 Questions</option><option value="all">All</option></select>
</div>
<div class="filter-row">
<label style="font-size:13px;display:flex;align-items:center;gap:6px"><input type="checkbox" id="qShuffle" checked> Shuffle</label>
<label style="font-size:13px;display:flex;align-items:center;gap:6px"><input type="checkbox" id="qErrorsOnly"> Errors Only</label>
</div>
<button class="start-btn" onclick="startQuiz()">Start</button>
<div id="poolInfo" style="margin-top:10px;font-size:12px;color:var(--text3)"></div>
</div>
<div id="quizArea" style="display:none"></div>
<div id="quizResults" style="display:none"></div>
</div>

<!-- REVIEW PANEL -->
<div class="panel" id="reviewPanel">
<div id="reviewContent"></div>
</div>
</div>

<script>
// === AUTH ===
const PWD='payson';
function doAuth(){
const v=document.getElementById('pw').value.toLowerCase().trim();
if(v===PWD){localStorage.setItem('ap_auth','1');showApp()}
else{document.getElementById('authErr').style.display='block'}
}
function showApp(){document.getElementById('auth').style.display='none';document.getElementById('app').style.display='block';init()}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth()});
if(localStorage.getItem('ap_auth')==='1')showApp();

// === DATA ===
let notes=null,mcq=[],frq=[],practice=[];
let currentUnit=null,currentSection=null;
let quizQuestions=[],quizIndex=0,quizAnswers={},quizMode='mcq';
let currentSubject='stats';

const SUBJECTS={
stats:{name:'Statistics',hasNotes:true,hasPractice:true},
'human-geo':{name:'Human Geography',hasNotes:false,hasPractice:false},
'us-history':{name:'US History',hasNotes:false,hasPractice:false},
'art-history':{name:'Art History',hasNotes:false,hasPractice:false},
'micro-econ':{name:'Microeconomics',hasNotes:false,hasPractice:false},
'physics-mech':{name:'Physics C: Mechanics',hasNotes:false,hasPractice:false},
'physics-em':{name:'Physics C: E&M',hasNotes:false,hasPractice:false},
};

async function loadSubject(slug){
currentSubject=slug;
notes=null;mcq=[];frq=[];practice=[];
const base='data/'+slug;
const fetches=[
fetch(base+'/questions/mcq.json').then(r=>r.ok?r.json():[]).catch(()=>[]),
fetch(base+'/questions/frq.json').then(r=>r.ok?r.json():[]).catch(()=>[]),
];
const info=SUBJECTS[slug];
if(info&&info.hasPractice) fetches.push(fetch(base+'/questions/practice.json').then(r=>r.ok?r.json():[]).catch(()=>[]));
else fetches.push(Promise.resolve([]));
if(info&&info.hasNotes) fetches.push(fetch(base+'/knowledge/notes.json').then(r=>r.ok?r.json():null).catch(()=>null));
else fetches.push(Promise.resolve(null));

const [m,f,p,n]=await Promise.all(fetches);
mcq=m;frq=f;practice=p;notes=n;

// Update UI
document.getElementById('topLoc').textContent=info?info.name:slug;
renderUnits();populateYears();
// Toggle learn tab visibility
const learnTab=document.querySelector('[data-tab="learn"]');
if(learnTab)learnTab.style.display=notes?'':'none';
// Toggle practice option
const practiceOpt=document.querySelector('#qType option[value="practice"]');
if(practiceOpt)practiceOpt.style.display=practice.length?'':'none';
// Update subject selector
document.querySelectorAll('.subj-btn').forEach(b=>b.classList.toggle('active',b.dataset.subj===slug));
// Reset quiz
resetQuiz();
switchTab(notes?'learn':'quiz');
// Pool info
const withAns=mcq.filter(q=>q.answer).length;
const pi=document.getElementById('poolInfo');
if(pi)pi.textContent=`${mcq.length} MCQ (${withAns} with answers) · ${frq.length} FRQ`;
}

function init(){
renderSubjectSelector();
loadSubject('stats');
}

function renderSubjectSelector(){
const bar=document.getElementById('subjectBar');
if(!bar)return;
bar.innerHTML=Object.entries(SUBJECTS).map(([slug,info])=>
`<button class="subj-btn ${slug==='stats'?'active':''}" data-subj="${slug}" onclick="loadSubject('${slug}')">${info.name}</button>`
).join('');
}

// === TABS ===

// Render content

// Highlight key terms
if(s.keyTerms&&s.keyTerms.length){
const terms=s.keyTerms.sort((a,b)=>b.length-a.length);
terms.forEach(t=>{

content=content.replace(re,'<span class="key-term">$1</span>');
});

// Convert to paragraphs

p=p.trim();

// Check for heading-like lines
if(p.length<80&&!p.includes('.')){
return`<h4>${p}</h4>`;
}
// Preserve single newlines as <br>

function startQuiz(){
const type=document.getElementById('qType').value;
const year=document.getElementById('qYear').value;
const count=document.getElementById('qCount').value;
const shuffle=document.getElementById('qShuffle').checked;
const errorsOnly=document.getElementById('qErrorsOnly').checked;
quizMode=type;

let pool=type==='mcq'?[...mcq]:type==='frq'?[...frq]:[...practice];

// Filter: only questions with options for MCQ
if(type==='mcq')pool=pool.filter(q=>q.options&&Object.keys(q.options).length>=4);

if(year!=='all')pool=pool.filter(q=>q.year==year);

if(errorsOnly){
const errs=JSON.parse(localStorage.getItem('ap_errors')||'{}');
pool=pool.filter(q=>errs[q.id]);
}

if(shuffle){for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}}

if(count!=='all')pool=pool.slice(0,parseInt(count));

if(!pool.length){alert('No questions match your filters');return}

quizQuestions=pool;
quizIndex=0;
quizAnswers={};
document.getElementById('quizConfig').style.display='none';
document.getElementById('quizResults').style.display='none';
document.getElementById('quizArea').style.display='block';
renderQuestion();
}

function renderQuestion(){
const q=quizQuestions[quizIndex];
const el=document.getElementById('quizArea');
const answered=quizAnswers[q.id]!==undefined;

let body='';
if(q.type==='mcq'&&q.options){
body=`<div class="q-text">${formatQText(q.text)}</div>
${q.has_figure?`<div style="text-align:center;margin:12px 0"><img src="data/${currentSubject}/images/${q.year}_q${q.number}.png" style="max-width:100%;border:1px solid var(--border);border-radius:var(--radius)" onerror="this.parentElement.innerHTML='<span style=color:var(--text3);font-size:13px>[Figure not available]</span>'"></div>`:''}
<div class="options">
${Object.entries(q.options).filter(([k,v])=>v&&v.trim()).map(([k,v])=>{
let cls='opt';
if(answered){
if(q.answer&&k===q.answer)cls+=' correct';
else if(quizAnswers[q.id]===k&&q.answer)cls+=' wrong';
else if(quizAnswers[q.id]===k&&!q.answer)cls+=' selected';
}else if(quizAnswers[q.id]===k){cls+=' selected'}
return`<div class="${cls}" onclick="selectOpt('${q.id}','${k}',${answered})">
<span class="letter">${k}</span><span>${formatQText(v)}</span></div>`;
}).join('')}
${answered&&!q.answer?'<div style="margin-top:8px;padding:8px 12px;background:var(--bg2);border-radius:var(--radius);font-size:12px;color:var(--text3)">⚠ Answer key not available for this question</div>':''}
</div>`;
}else{
// FRQ
body=`<div class="q-text">${formatQText(q.text)}</div>`;
if(q.parts&&q.parts.length){
body+=`<div class="frq-parts">${q.parts.map(p=>`
<div class="frq-part"><div class="part-label">${esc(p.label)}</div><div class="part-text">${esc(p.text)}</div></div>`).join('')}</div>`;
}

body+=`<button class="show-answer-btn" onclick="this.nextElementSibling.style.display='block';this.style.display='none'">Show Scoring Guide</button>
<div class="scoring-guide">${esc(q.scoringGuideline)}</div>`;
}
}

function selectOpt(qid,letter,alreadyAnswered){
if(alreadyAnswered)return;
quizAnswers[qid]=letter;
// Check correctness
const q=quizQuestions.find(q=>q.id===qid);
if(q&&q.answer&&letter!==q.answer){
// Log error
const errs=JSON.parse(localStorage.getItem('ap_errors')||'{}');
if(!errs[qid])errs[qid]={count:0,dates:[],text:q.text.substring(0,100),year:q.year,subject:currentSubject};
errs[qid].count++;
errs[qid].dates.push(new Date().toISOString().split('T')[0]);
localStorage.setItem('ap_errors',JSON.stringify(errs));
}
// Track all attempts for stats
const stats=JSON.parse(localStorage.getItem('ap_stats')||'{}');
if(!stats[currentSubject])stats[currentSubject]={total:0,correct:0,byYear:{}};
const s=stats[currentSubject];
s.total++;
if(q&&q.answer&&letter===q.answer)s.correct++;
if(q&&q.year){
if(!s.byYear[q.year])s.byYear[q.year]={total:0,correct:0};
s.byYear[q.year].total++;
if(q.answer&&letter===q.answer)s.byYear[q.year].correct++;
}
localStorage.setItem('ap_stats',JSON.stringify(stats));
renderQuestion();
}

// === UTILS ===
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function formatQText(text){
if(!text)return'';
// Try to detect and render inline tables (no newlines between rows)
text=renderInlineTables(text);
// Now handle normal multiline tables
const lines=text.split('\n');
let result=[],inTable=false,tableRows=[];
for(let i=0;i<lines.length;i++){
const line=lines[i].trim();
if(line.startsWith('|')&&line.endsWith('|')){
if(!inTable){inTable=true;tableRows=[]}
if(/^\|[\s\-:|]+\|$/.test(line))continue;
const cells=line.split('|').slice(1,-1).map(c=>c.trim());
tableRows.push(cells);
}else{
if(inTable){
result.push(buildTable(tableRows));
inTable=false;tableRows=[];
}
if(line)result.push(esc(line));
}
}
if(inTable)result.push(buildTable(tableRows));
return result.join('<br>');
}
function renderInlineTables(text){
// Find separator pattern |---|---|---| to detect inline table
const sepMatch=text.match(/\|([\s-]{2,}\|){2,}/);
if(!sepMatch)return text;
const sep=sepMatch[0];
const numCols=(sep.match(/\|/g)||[]).length-1;
const pipesPerRow=numCols+1;
// Find table region: look for consecutive pipes around separator
const sepIdx=text.indexOf(sep);
// Find all pipes in text
const pipePositions=[];
for(let i=0;i<text.length;i++){if(text[i]==='|')pipePositions.push(i)}
// Find which pipe index starts the separator
const sepFirstPipe=pipePositions.indexOf(sepIdx);
// Table starts at pipe index that's a multiple of pipesPerRow before separator
const headerStart=sepFirstPipe-pipesPerRow;
if(headerStart<0)return text;
// Find how many complete rows exist after separator
const totalPipesAfterSep=pipePositions.length-(sepFirstPipe+pipesPerRow);
const dataRows=Math.floor(totalPipesAfterSep/pipesPerRow);
const totalTablePipes=(2+dataRows)*pipesPerRow; // header+sep+data
const tableEndPipeIdx=headerStart+totalTablePipes-1;
if(tableEndPipeIdx>=pipePositions.length)return text;
const tStart=pipePositions[headerStart];
const tEnd=pipePositions[tableEndPipeIdx]+1;
// Extract and rebuild with newlines
const tableStr=text.substring(tStart,tEnd);
const allParts=tableStr.split('|');
// Group into rows (each row has numCols cells between numCols+1 pipes)
const rows=[];
for(let i=0;i<allParts.length-1;i+=pipesPerRow){
const row=allParts.slice(i+1,i+pipesPerRow).map(c=>c.trim());
if(row.length===numCols)rows.push('|'+row.join('|')+'|');
}
return text.substring(0,tStart).trim()+'\n'+rows.join('\n')+'\n'+text.substring(tEnd).trim();
}
function buildTable(rows){
if(!rows.length)return'';
let h='<table><thead><tr>'+rows[0].map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr></thead>';
if(rows.length>1){
h+='<tbody>'+rows.slice(1).map(r=>'<tr>'+r.map(c=>'<td>'+esc(c)+'</td>').join('')+'</tr>').join('')+'</tbody>';
}
return h+'</table>';
}

function toggleTheme(){
const isDark=document.documentElement.getAttribute('data-theme')==='dark';
document.documentElement.setAttribute('data-theme',isDark?'':'dark');
localStorage.setItem('ap_theme',isDark?'light':'dark');
